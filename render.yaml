services:
  - type: web
    name: rtbio-survey-app
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /opt/render/project/src/data
    disk:
      name: rtbio-survey-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
